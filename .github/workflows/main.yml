name: Daily Coupang Price Update & Deploy

on:
  schedule:
    # Run every day at 23:00 UTC (08:00 AM KST)
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Data Fetch Script
      env:
        COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
        COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
      run: python fetch_data.py

    - name: Run Calculation Logic
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python calc_logic.py

    - name: Build HTML SSG
      run: python build_html.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add raw_data.json final_ranking.json index.html
        # If there are changes, commit them
        if ! git diff-index --quiet HEAD; then
          git commit -m "Auto-update: Daily Coupang Rankings [skip ci]"
          git push
        else
          echo "No changes to commit"
        fi
